networks:
  ai_net:
    external: true
  business_net:
    external: true
  browser_net:
    name: browser_net   # Isolated internet-egress network — a2a-browser only

volumes:
  compose_ollama_models:  # Maps to RAID per §2 — a2a-browser has no persistent volumes (stateless)
  whisper_models:         # HuggingFace model cache (faster-whisper-medium ~769 MB)
  # nc_db, nc_html, nc_data, nc_config, nc_apps, nc_themes, redis_data migrated to RAID bind mounts at /home/nextcloud/

secrets:
  sovereign_key:
    file: /home/sovereign/keys/sovereign.key

services:
  # searxng and a2a-browser removed 2026-03-19 — replaced by node04 instance
  # (172.16.201.4:8001). A2A_BROWSER_URL in secrets/browser.env points to node04.
  # Local searxng/a2a-browser-deploy/ directories kept for reference only.

  docker-broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    container_name: docker-broker
    restart: unless-stopped
    pid: host  # required for nsenter → systemctl_status, journalctl, apt_check
    cap_add:
      - SYS_ADMIN   # nsenter: enter host mount namespace (needed for systemctl/journalctl/apt_check)
      - SYS_PTRACE  # nsenter: read /proc/1/ns/* symlinks
    security_opt:
      - apparmor=unconfined  # AppArmor blocks setns even with SYS_ADMIN — broker already holds docker.sock
    networks:
      - ai_net
      - business_net  # needed for Nextcloud (nc_*) commands via Node.js scripts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/sovereign/governance/docker-policy.yaml:/policy/docker-policy.yaml:ro
      - ./broker/commands-policy.yaml:/policy/commands-policy.yaml:ro
      - ./broker/scripts:/scripts:ro
      - /:/hostfs:ro  # Host filesystem — read-only examination by Rex
    env_file:
      - ./secrets/imap-personal.env
      - ./secrets/imap-business.env
      - ./secrets/webdav.env
    environment:
      - BROKER_POLICY=/policy/docker-policy.yaml
      - COMMANDS_POLICY=/policy/commands-policy.yaml
      - SCRIPTS_DIR=/scripts
      - NODE_PATH=/app/node_modules  # imap/smtp deps installed in broker image
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8088/health || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 20s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    networks:
      - ai_net
    volumes:
      - /home/sovereign/vector:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 10s
      retries: 3

  sovereign-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: sovereign-core
    restart: unless-stopped
    secrets: [sovereign_key]
    depends_on:
      docker-broker:
        condition: service_healthy
      ollama:
        condition: service_healthy
      whisper:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - ai_net
      - business_net  # Dual-homed per §3
    ports:
      - "127.0.0.1:8000:8000"  # Loopback-only API
    volumes:
      - /home/sovereign/governance/governance.json:/app/governance/governance.json:ro
      - /home/sovereign/governance:/home/sovereign/governance:ro
      - /home/sovereign/governance/wallet-config.json:/home/sovereign/governance/wallet-config.json:rw
      - /home/sovereign/personas:/home/sovereign/personas:ro
      - /home/sovereign/audit:/home/sovereign/audit
      - /home/sovereign/security:/home/sovereign/security
      - /home/sovereign/docs:/home/sovereign/docs
      - /home/sovereign/keys:/home/sovereign/keys:rw
      - /home/sovereign/skills:/home/sovereign/skills:rw
    env_file:
      - ./secrets/grok.env
      - ./secrets/claude.env
      - ./secrets/telegram.env
      - ./secrets/ollama.env
      - ./secrets/whisper.env
      - ./secrets/openclaw.env
      - ./secrets/webdav.env
      - ./secrets/imap-personal.env
      - ./secrets/imap-business.env
      - ./secrets/browser.env
      - ./secrets/github.env
      - ./secrets/wallet.env
    environment:
      - SOVEREIGN_KEY_PATH=/run/secrets/sovereign_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks: [ai_net]
    ports: ["127.0.0.1:11434:11434"]
    env_file: ./secrets/ollama.env
    volumes:
      - compose_ollama_models:/root/.ollama  # RAID-bound per §2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5

  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: whisper
    restart: unless-stopped
    networks: [ai_net]
    env_file: ./secrets/whisper.env
    environment:
      - WHISPER_MODEL=Systran/faster-whisper-medium
    volumes:
      - whisper_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Nextcloud stack (per Phase 2 integration; from P3-NextCloud-Implementation_v1.1.md §4)
  db:
    image: mariadb:10.11
    container_name: nc-db
    restart: unless-stopped
    networks: [business_net]
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    env_file: ./secrets/nextcloud.env
    volumes:
      - /home/nextcloud/db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nc-redis
    restart: unless-stopped
    networks: [business_net]
    env_file: ./secrets/redis.env
    command: ["sh", "-c", "redis-server --requirepass $$REDIS_PASSWORD"]
    volumes:
      - /home/nextcloud/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [business_net]
    env_file: ./secrets/nextcloud.env
    volumes:
      - /home/nextcloud/html:/var/www/html
      - /home/nextcloud/data:/var/www/html/data
      - /home/nextcloud/config:/var/www/html/config
      - /home/nextcloud/apps:/var/www/html/custom_apps
      - /home/nextcloud/themes:/var/www/html/themes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g

  sov-wallet:
    build:
      context: ./wallet
      dockerfile: Dockerfile
    container_name: sov-wallet
    restart: unless-stopped
    networks: [ai_net, browser_net]
    # No host port binding — Safe proxy API accessible on ai_net only (port 3001)
    env_file:
      - ./secrets/wallet.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    depends_on:
      sovereign-core:
        condition: service_healthy
    networks: [ai_net]
    env_file:
      - ./secrets/telegram.env
    environment:
      - SOVEREIGN_CORE_URL=http://sovereign-core:8000

  nanobot-01:
    build:
      context: .
      dockerfile: nanobot-01/Dockerfile
    container_name: nanobot-01
    restart: unless-stopped
    networks:
      - ai_net      # sovereign-core reaches it here
      - business_net  # required: nextcloud.py connects to http://nextcloud (business_net)
    volumes:
      - /home/sovereign/skills:/skills:ro          # Read-only skill definitions
      - /docker/sovereign/nanobot-01/workspace:/workspace  # Task workspace
      - /home/sovereign/nanobot-01/memory:/memory  # Durable nanobot memory (RAID)
    # No docker.sock, no privileged, no extra capabilities, no host ports
    # Phase 1 credential delegation: static env var mounts (ai_net only, contained risk)
    # Phase 2 will replace these with session-scoped token proxy via sovereign-core
    env_file:
      - ./secrets/imap-business.env
      - ./secrets/imap-personal.env
      - ./secrets/nextcloud.env
    environment:
      - NANOBOT_CONFIG=/workspace/.nanobot/config.json
      - NANOBOT_WORKSPACE=/workspace
      - SKILLS_DIR=/skills
      - MEMORY_DIR=/memory
      - NANOBOT_TASK_TIMEOUT=25
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s   # nanobot-ai install may be slow on first boot

  nextcloud-rp:
    image: nginx:alpine
    container_name: nextcloud-rp
    restart: unless-stopped
    depends_on: [nextcloud]
    networks: [business_net]
    ports:
      - "127.0.0.1:8080:80"
      - "100.111.130.60:80:80"
      - "100.111.130.60:8443:8443"
    volumes:
      - ./nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/sovereign.tail887d2b.ts.net.crt:/etc/nginx/certs/sovereign.tail887d2b.ts.net.crt:ro
      - ./nginx/sovereign.tail887d2b.ts.net.key:/etc/nginx/certs/sovereign.tail887d2b.ts.net.key:ro    

    healthcheck:
      test: ["CMD", "wget", "-T", "4", "-qO-", "http://127.0.0.1/status.php"]
      interval: 30s
      timeout: 5s
      retries: 5
