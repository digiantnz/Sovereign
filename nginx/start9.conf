# ── Start9 Services Proxy ─────────────────────────────────────────────────────
# Reverse proxies Start9/StartOS .local HTTPS services for internal containers.
# TLS verification disabled — Start9 uses self-signed certificates on .local domains.
#
# Internal containers call http://nginx:3009/<service>/... over plain HTTP.
# nginx handles hostname resolution (via extra_hosts in compose.yml) and TLS.
#
# Adding a new Start9 service:
#   1. Find the service LAN address in StartOS → Services → <name> → Interfaces
#   2. Add a location /<slug>/ block below with proxy_pass to its .local hostname
#   3. Add "<hostname>.local:172.16.201.5" to extra_hosts on nginx in compose.yml
#   4. docker compose up -d nginx  (no rebuild — conf is a volume mount)

server {
    listen 3009;
    server_name _;

    # ── BTCPay Server ──────────────────────────────────────────────────────────
    # LAN address: fh5cflagwhegmfxgd2bjdbj4ykahqnjz6bwtweoqrhtvco27d7w4siid.local
    # Internal URL: http://nginx:3009/btcpay/api/v1/stores/{id}/lightning/BTC/...
    location /btcpay/ {
        proxy_pass            https://fh5cflagwhegmfxgd2bjdbj4ykahqnjz6bwtweoqrhtvco27d7w4siid.local/;
        proxy_ssl_verify      off;
        proxy_ssl_server_name on;
        proxy_set_header      Host fh5cflagwhegmfxgd2bjdbj4ykahqnjz6bwtweoqrhtvco27d7w4siid.local;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    30s;
    }

    # ── Specter Desktop ────────────────────────────────────────────────────────
    # LAN address: qw3yplotmsvrs2hfr3ssc44j3lqpvyvsqqthprg646i4pjwc7hqzqvid.local
    # Internal URL: http://nginx:3009/specter/...
    location /specter/ {
        proxy_pass            https://qw3yplotmsvrs2hfr3ssc44j3lqpvyvsqqthprg646i4pjwc7hqzqvid.local/;
        proxy_ssl_verify      off;
        proxy_ssl_server_name on;
        proxy_set_header      Host qw3yplotmsvrs2hfr3ssc44j3lqpvyvsqqthprg646i4pjwc7hqzqvid.local;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    30s;
        proxy_redirect        / /specter/;
    }

    # ── Bitcoin Knots (full node RPC) ──────────────────────────────────────────
    # LAN address: lpgcfdmen44ygyckkeywhlui7nni4ttz6x3d5i25x3rhad3ab2gl5zyd.local
    # Internal URL: http://nginx:3009/knots/...
    location /knots/ {
        proxy_pass            https://lpgcfdmen44ygyckkeywhlui7nni4ttz6x3d5i25x3rhad3ab2gl5zyd.local/;
        proxy_ssl_verify      off;
        proxy_ssl_server_name on;
        proxy_set_header      Host lpgcfdmen44ygyckkeywhlui7nni4ttz6x3d5i25x3rhad3ab2gl5zyd.local;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    30s;
    }

    location / {
        return 403;
    }
}
