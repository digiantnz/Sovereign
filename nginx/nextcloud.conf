# ── Sovereign Management Portal ──────────────────────────────────────────────
# Proxies read-only portal endpoints only. /chat and all other sovereign-core
# routes are NOT proxied — they remain internal on the Docker network.
server {
    listen 8000;
    server_name _;

    # Docker's internal DNS — forces per-request resolution so nginx doesn't
    # cache the ai_net IP at startup (nginx is only on business_net).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SSE log stream — disable buffering so events flow through immediately
    location = /logs/stream {
        set $sovereign http://sovereign-core:8000;
        proxy_pass $sovereign;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding on;
    }

    location ~* ^/(dashboard|health|metrics|skills|harnesses|governance|memory/preview|config|ollama/models) {
        set $sovereign http://sovereign-core:8000;
        proxy_pass $sovereign;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Block everything else — /chat, /metrics, internal endpoints
    location / {
        return 403;
    }
}

# ── Nextcloud (Tailscale only) ────────────────────────────────────────────────
server {
    listen 80;
    server_name sovereign.tail887d2b.ts.net;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /status.php {
        set $nc_upstream http://nextcloud:80;
        proxy_pass $nc_upstream;
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}
server {
    listen 8443 ssl;
    server_name sovereign.tail887d2b.ts.net;
    ssl_certificate /etc/nginx/certs/sovereign.tail887d2b.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/sovereign.tail887d2b.ts.net.key;
    client_max_body_size 10G;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /.well-known/carddav {
        return 301 $scheme://$host/remote.php/dav;
    }
    location = /.well-known/caldav {
        return 301 $scheme://$host/remote.php/dav;
    }
    location ^~ /.well-known {
        return 301 $scheme://$host/index.php$uri;
    }
    location / {
        set $nc_upstream http://nextcloud:80;
        proxy_pass $nc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_connect_timeout 3600;
        proxy_send_timeout 3600;
        proxy_redirect off;
    }
}
