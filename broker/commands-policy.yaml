# Broker CLI command execution allowlist
# POST /exec/{command_name} — system diagnostics and controlled workflows.
#
# Each entry:
#   binary:       absolute path to executable in broker container, OR __container_exec__ / __script__
#   fixed_args:   args always prepended — callers cannot override these
#   params:       typed parameter schema (string with optional allowlist, integer with min/max)
#   tier:         low | medium | high — minimum trust level header required
#   enabled:      true | false — false = 503 with reason, never 403 (command exists but needs infra change)
#   description:  human-readable purpose and any notes

commands:

  uname:
    description: "Kernel name, hostname, kernel release, machine architecture"
    binary: /bin/uname
    fixed_args: ["-a"]
    params: {}
    tier: low
    enabled: true

  df:
    description: "Disk free space (human-readable). Shows broker container mounts including /hostfs bind."
    binary: /bin/df
    fixed_args: ["-h"]
    params: {}
    tier: low
    enabled: true

  du:
    description: >
      Directory disk usage (human-readable summary). Runs du -sh against an allowlisted
      host path via /hostfs bind-mount. Note: du does not cross mount boundaries, so
      Docker volume mounts (e.g. /home/sovereign/vector on RAID) must be queried directly.
    binary: /usr/bin/du
    fixed_args: ["-sh"]
    params:
      path:
        type: string
        required: true
        allowlist:
          - /hostfs/home/sovereign/vector
          - /hostfs/home/sovereign/docs
          - /hostfs/home/sovereign/governance
          - /hostfs/home/sovereign/security
          - /hostfs/home/sovereign/sovereign
          - /hostfs/var/lib/docker
          - /hostfs/home/sovereign
    tier: low
    enabled: true

  free:
    description: "RAM and swap usage in megabytes. Reads /proc/meminfo — reflects host kernel values."
    binary: /usr/bin/free
    fixed_args: ["-m"]
    params: {}
    tier: low
    enabled: true

  ps:
    description: "Process list visible to broker container."
    binary: /bin/ps
    fixed_args: ["aux"]
    params: {}
    tier: low
    enabled: true

  nvidia_smi:
    description: "NVIDIA GPU status including power draw. Uses nsenter+su matt (NVML fails as root with open kernel module)."
    binary: /usr/bin/nsenter
    fixed_args:
      - "-t"
      - "1"
      - "-m"
      - "-p"
      - "--"
      - /bin/su
      - "-s"
      - /bin/sh
      - matt
      - "-c"
      - "nvidia-smi --query-gpu=name,memory.used,memory.total,utilization.gpu,utilization.memory,temperature.gpu,power.draw --format=csv,noheader,nounits"
    params: {}
    tier: low
    enabled: true

  systemctl_status:
    description: >
      Systemd service status on host. Uses nsenter into host PID namespace.
      Requires pid:host (compose.yml) + util-linux (Dockerfile) — both enabled.
    binary: /usr/bin/nsenter
    fixed_args: ["-t", "1", "-m", "--", "/usr/bin/systemctl", "status", "--no-pager", "-l"]
    params:
      service:
        type: string
        required: true
        allowlist:
          - docker
          - ssh
          - ufw
          - fail2ban
          - nfs-server
          - cron
          - unattended-upgrades
          - nvidia-power-limit
          - sovereign-stack
    tier: low
    enabled: true

  journalctl:
    description: >
      Read systemd journal on host. Uses nsenter into host PID namespace.
      params: unit (optional, allowlisted), lines (1-500, default 50).
    binary: /usr/bin/nsenter
    fixed_args: ["-t", "1", "-m", "--", "/usr/bin/journalctl", "--no-pager"]
    params:
      unit:
        type: string
        flag: "-u"
        required: false
        allowlist:
          - docker
          - ssh
          - ufw
          - fail2ban
          - kernel
          - cron
          - syslog
          - nvidia-power-limit
          - sovereign-stack
      lines:
        type: integer
        flag: "-n"
        required: false
        default: 50
        min: 1
        max: 500
    tier: low
    enabled: true

  apt_check:
    description: >
      Check host OS for available package updates. Runs apt-get update + apt list --upgradable
      via nsenter into host PID namespace. Returns one upgradable package per line.
      Read-only — never installs or modifies packages.
    binary: /bin/sh
    fixed_args: ["/scripts/apt_check.sh"]
    params: {}
    tier: low
    enabled: true

  # ── Docker lifecycle ──────────────────────────────────────────────────────

  docker_recreate:
    description: >
      Force-recreate a named container via docker compose up -d --force-recreate.
      Fixes containers that started without network interfaces (e.g. nginx).
      Uses nsenter to run docker compose on the host. MID tier — requires confirmation.
    binary: /usr/bin/nsenter
    fixed_args:
      - "-t"
      - "1"
      - "-m"
      - "-p"
      - "--"
      - "/usr/bin/docker"
      - "compose"
      - "-f"
      - "/docker/sovereign/compose.yml"
      - "up"
      - "-d"
      - "--force-recreate"
    timeout_ms: 120000
    params:
      container:
        type: string
        required: true
        allowlist:
          - nginx
          - nextcloud
          - ollama
          - ollama-embed
          - nanobot-01
          - gateway
          - qdrant
          - qdrant-archive
          - nc-db
          - nc-redis
          - sov-wallet
          - docker-broker
          - sovereign-core
    tier: medium
    enabled: true

  # ── Dev-Harness Phase 1 commands ──────────────────────────────────────────
  # These commands run static analysis tools against the sovereign-core source
  # tree on the host filesystem (/hostfs/home/sovereign/sovereign/core/app).

  dev_analyse:
    description: >
      Dev-Harness Phase 1 full analysis run. Executes pylint, semgrep, and
      boundary_scanner in sequence. Returns NDJSON tool-envelope lines. Always exits 0.
    binary: /bin/sh
    fixed_args: ["/scripts/dev_analyse.sh"]
    params: {}
    tier: medium
    enabled: true

  dev_pylint:
    description: >
      Run pylint --output-format=json against sovereign-core app directory.
      Scan target: /hostfs/home/sovereign/sovereign/core/app
    binary: /usr/bin/python3
    fixed_args:
      - "-m"
      - "pylint"
      - "--output-format=json"
      - "/hostfs/home/sovereign/sovereign/core/app"
    params: {}
    tier: medium
    enabled: true

  dev_semgrep:
    description: >
      Run semgrep --json with the local custom ruleset (semgrep-rules.yaml).
      Scan target: /hostfs/home/sovereign/sovereign/core/app
    binary: /usr/bin/semgrep
    fixed_args:
      - "--config"
      - "/app/semgrep-rules.yaml"
      - "--json"
      - "/hostfs/home/sovereign/sovereign/core/app"
    params: {}
    tier: medium
    enabled: true

  dev_boundary_scan:
    description: >
      Run boundary_scanner.py against sovereign-core app directory.
      Scan target: /hostfs/home/sovereign/sovereign/core/app
    binary: /usr/bin/python3
    fixed_args:
      - "/scripts/boundary_scanner.py"
      - "/hostfs/home/sovereign/sovereign/core/app"
    params: {}
    tier: medium
    enabled: true

  dev_git_diff:
    description: >
      Get the git diff of uncommitted changes in the sovereign-core source tree.
      Repo root: /hostfs/home/sovereign/sovereign
    binary: /usr/bin/git
    fixed_args:
      - "-C"
      - "/hostfs/home/sovereign/sovereign"
      - "diff"
      - "--unified=5"
    params: {}
    tier: medium
    enabled: true

  # ── Docker lifecycle (build/pull) ─────────────────────────────────────────

  docker_build:
    description: >
      Build (or rebuild) a named service image via docker compose build --no-cache.
      Uses nsenter to run docker compose on the host.
      HIGH tier — requires double confirmation. Timeout 10 minutes.
    binary: /usr/bin/nsenter
    fixed_args:
      - "-t"
      - "1"
      - "-m"
      - "-p"
      - "--"
      - "/usr/bin/docker"
      - "compose"
      - "-f"
      - "/docker/sovereign/compose.yml"
      - "build"
      - "--no-cache"
    timeout_ms: 600000
    params:
      service:
        type: string
        required: true
        allowlist:
          - sovereign-core
          - gateway
          - nanobot-01
          - docker-broker
    tier: high
    enabled: true
